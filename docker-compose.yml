services:
  
  #postgresql 
  postgres: 
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: streamshop
      POSTGRES_PASSWORD: streamshop123
      POSTGRES_DB: orders
    ports: 
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamshop -d orders"]      
      interval: 5s
      timeout: 5s
      retries: 5

  #zookeeper - pour kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"

  #Kafka 
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST: accessible depuis ta machine (localhost:9092)
      # PLAINTEXT: accessible entre conteneurs (kafka:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1    # 1 = pas de réplication (dev seulement)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
  
  #Kafka UI 
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka


  #Service orders
  order-service:
    build: ./OrderService              
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=orders;Username=streamshop;Password=streamshop123"
      Kafka__BootstrapServers: "kafka:29092"
    depends_on:
      postgres:
        condition: service_healthy     
      kafka:
        condition: service_started

volumes:
  postgres_data:
    

  